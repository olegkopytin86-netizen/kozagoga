    <rect x="606" y="190" width="96" height="124" rx="18" fill="#8B5CF6" stroke="#C084FC" stroke-width="7"/>
    <path d="M648 232V274" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>
    <path d="M648 232L681 223V247L648 256" stroke="#FFFFFF" stroke-width="14" stroke-linejoin="round"/>
    <circle cx="630" cy="279" r="15" fill="#FFFFFF"/>

    <rect x="719" y="224" width="90" height="111" rx="18" fill="#6D28D9" stroke="#B983FF" stroke-width="7"/>
    <path d="M754 260L754 304L789 282L754 260Z" fill="#FFFFFF"/>

    <path d="M577 355H749" stroke="#C084FC" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
    <path d="M593 424H729" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity="0.86"/>
