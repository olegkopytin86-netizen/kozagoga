    <path d="M540 315H783L744 466H577L540 315Z" stroke="#C084FC" stroke-width="8" stroke-linejoin="round"/>
    <path d="M522 286C543 284 557 298 562 319" stroke="#7C3AED" stroke-width="18" stroke-linecap="round"/>
    <path d="M589 483H741" stroke="#7C3AED" stroke-width="18" stroke-linecap="round"/>
    <circle cx="604" cy="516" r="28" fill="#7C3AED"/>
    <circle cx="604" cy="516" r="13" fill="#C084FC" opacity="0.85"/>
    <circle cx="728" cy="516" r="28" fill="#7C3AED"/>
    <circle cx="728" cy="516" r="13" fill="#C084FC" opacity="0.85"/>

