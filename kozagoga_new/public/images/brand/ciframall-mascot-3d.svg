    <ellipse cx="267" cy="264" rx="54" ry="67" fill="#05070C"/>
    <ellipse cx="267" cy="264" rx="54" ry="67" stroke="#FFFFFF" stroke-width="10"/>
    <circle cx="248" cy="238" r="17" fill="#FFFFFF"/>
    <circle cx="278" cy="224" r="8" fill="#FFFFFF" opacity="0.85"/>

    <ellipse cx="379" cy="264" rx="54" ry="67" fill="#05070C"/>
    <ellipse cx="379" cy="264" rx="54" ry="67" stroke="#FFFFFF" stroke-width="10"/>
    <circle cx="360" cy="238" r="17" fill="#FFFFFF"/>
    <circle cx="390" cy="224" r="8" fill="#FFFFFF" opacity="0.85"/>

