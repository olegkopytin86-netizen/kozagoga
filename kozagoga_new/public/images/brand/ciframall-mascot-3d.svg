    <g>
      <ellipse cx="410" cy="506" rx="36" ry="58" fill="#05070C"/>
      <ellipse cx="410" cy="506" rx="36" ry="58" stroke="#FFFFFF" stroke-width="8"/>
      <path d="M394 472C409 459 428 465 436 485" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.82"/>
    </g>
