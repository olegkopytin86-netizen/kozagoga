<svg width="900" height="650" viewBox="0 0 900 650" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bodyWhite" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(305 245) rotate(55) scale(285 330)">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.52" stop-color="#FFFFFF"/>
      <stop offset="0.78" stop-color="#F7F7FB"/>
      <stop offset="1" stop-color="#ECECF4"/>
    </radialGradient>
    <linearGradient id="softWhite" x1="155" y1="70" x2="455" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.62" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F3F8"/>
    </linearGradient>
    <linearGradient id="purpleCart" x1="540" y1="260" x2="740" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A855F7"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="purpleLight" x1="540" y1="190" x2="770" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C084FC"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="eyeGloss" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(45) scale(72)">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.22" stop-color="#FFFFFF"/>
      <stop offset="0.25" stop-color="#111827"/>
      <stop offset="1" stop-color="#030712"/>
    </radialGradient>
    <filter id="shadow" x="0" y="0" width="900" height="650" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="28" flood-color="#000000" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#7C3AED" flood-opacity="0.18"/>
    </filter>
    <filter id="cartShadow" x="420" y="190" width="410" height="390" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#3B0764" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- floor glow -->
  <ellipse cx="392" cy="548" rx="350" ry="54" fill="url(#purpleLight)" opacity="0.16"/>
  <ellipse cx="390" cy="552" rx="292" ry="26" fill="#FFFFFF" opacity="0.16"/>

