    <path d="M288 356C309 382 344 382 365 356" stroke="#111827" stroke-width="12" stroke-linecap="round"/>
    <circle cx="287" cy="354" r="6" fill="#111827"/>
    <circle cx="366" cy="354" r="6" fill="#111827"/>

    <!-- wheels / feet -->
    <g>
      <ellipse cx="230" cy="506" rx="36" ry="58" fill="#05070C"/>
